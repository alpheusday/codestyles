name: Code Quality

on:
    pull_request:
    push:

jobs:
    lint:
        name: Lint
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Install just
              uses: extractions/setup-just@v4

            - name: Setup Node
              uses: alpheusci/setup-node@v1

            - name: Install ls-lint
              run: brew install ls-lint

            - name: Install typos-cli
              run: brew install typos-cli

            - name: Run ls-lint
              run: just ls-lint

            - name: Run typos-cli
              run: just typos

            - name: Run lint
              run: just lint
